# Render.com Infrastructure as Code Blueprint
# Docs: https://docs.render.com/blueprint-spec
# Deploy: https://dashboard.render.com/select-repo?type=blueprint

databases:
  - name: arifa-db
    plan: starter
    databaseName: arifa
    user: arifa
    postgresMajorVersion: "16"

redis:
  - name: arifa-redis
    plan: starter  # free 25 MB
    maxmemoryPolicy: allkeys-lru

services:
  # ---------- Backend API ----------
  - type: web
    name: arifa-api
    runtime: docker
    repo: https://github.com/cmotta11/arifa
    branch: main
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    dockerTarget: prod
    plan: starter
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: arifa-api.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: arifa-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: arifa-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: arifa-redis
          type: redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://arifa-frontend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://arifa-frontend.onrender.com,https://arifa-api.onrender.com
      - key: FRONTEND_URL
        value: https://arifa-frontend.onrender.com
      - key: PYTHON_VERSION
        value: "3.12"
    disk:
      name: arifa-media
      mountPath: /app/mediafiles
      sizeGB: 1

  # ---------- Celery Worker + Beat ----------
  - type: worker
    name: arifa-worker
    runtime: docker
    repo: https://github.com/cmotta11/arifa
    branch: main
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    dockerTarget: prod
    plan: starter
    dockerCommand: celery -A config worker -l info -B --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: arifa-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: arifa-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: arifa-redis
          type: redis
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12"

  # ---------- Frontend Static Site ----------
  - type: web
    name: arifa-frontend
    runtime: static
    repo: https://github.com/cmotta11/arifa
    branch: main
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://arifa-api.onrender.com/api/v1
      - key: NODE_VERSION
        value: "20"
